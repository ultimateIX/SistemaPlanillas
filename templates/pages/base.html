{% load static %}

<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>

    {% block title %}

        Sistema de Planillas

    {% endblock %}

</title>

<link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

<link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
    rel="stylesheet">

<link
    rel="stylesheet"
    href="{% static 'css/styles.css' %}?v=99">

<script src="https://unpkg.com/htmx.org@1.9.10"></script>

</head>

<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

<div
    id="loader"
    class="loader-container">

    <div class="spinner-border text-primary"></div>

</div>

<div class="sidebar">

    <div class="logo-container">

        <img
            src="{% static 'img/logo2.png' %}"
            alt="Logo"
            class="logo">

    </div>

    <div class="menu">

        <a
            hx-get="{% url 'dashboard' %}"
            hx-target="#contenido"
            hx-push-url="true">

            <i class="bi bi-speedometer2"></i>
            Dashboard

        </a>

        <a
            hx-get="{% url 'empleados' %}"
            hx-target="#contenido"
            hx-push-url="true">

            <i class="bi bi-people"></i>
            Empleados

        </a>

        <a
            hx-get="{% url 'planillas' %}"
            hx-target="#contenido"
            hx-push-url="true">

            <i class="bi bi-cash-stack"></i>
            Planillas

        </a>

        <a
            hx-get="{% url 'productos' %}"
            hx-target="#contenido"
            hx-push-url="true">

            <i class="bi bi-box-seam"></i>
            Productos

        </a>

        <a
            hx-get="{% url 'compras' %}"
            hx-target="#contenido"
            hx-push-url="true">

            <i class="bi bi-cart-plus"></i>
            Compras

        </a>

        <a
            hx-get="{% url 'ventas' %}"
            hx-target="#contenido"
            hx-push-url="true">

            <i class="bi bi-cart-dash"></i>
            Ventas

        </a>

        <a
            hx-get="{% url 'asistencias' %}"
            hx-target="#contenido"
            hx-push-url="true">

            <i class="bi bi-calendar-check"></i>
            Asistencias

        </a>

        <a
            hx-get="{% url 'ausencias' %}"
            hx-target="#contenido"
            hx-push-url="true">

            <i class="bi bi-calendar-x"></i>
            Ausencias

        </a>

        <a
            hx-get="{% url 'historial_movimientos' %}"
            hx-target="#contenido"
            hx-push-url="true">

            <i class="bi bi-clock-history"></i>
            Historial de Movimientos

        </a>

        <a
            hx-get="{% url 'historial_cambios' %}"
            hx-target="#contenido"
            hx-push-url="true">

            <i class="bi bi-journal-text"></i>
            Historial Cambios

        </a>

        <a
            hx-get="{% url 'configuracion' %}"
            hx-target="#contenido"
            hx-push-url="true">

            <i class="bi bi-gear"></i>
            Configuración

        </a>

    </div>

    <div class="sidebar-footer">

        <a
            href="{% url 'logout' %}"
            class="logout-btn">

            <i class="bi bi-box-arrow-right"></i>
            Cerrar sesión

        </a>

    </div>

</div>

<div
    class="main"
    id="contenido">

    {% block content %}
    {% endblock %}

</div>

<div id="modal-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="{% static 'js/app.js' %}?v=5"></script>

</body>

</html>
