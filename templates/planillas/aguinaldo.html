<div class="d-flex justify-content-between align-items-center mb-4">

    <h2>

        Tabla Aguinaldo

    </h2>

    <button
        class="btn btn-primary"

        hx-get="{% url 'aguinaldo_crear' %}"

        hx-target="#modal-container"

        hx-swap="innerHTML">

        <i class="bi bi-plus-circle"></i>

        Nuevo Tramo

    </button>

</div>

<div class="card">

    <div class="card-body">

        <table class="table table-hover">

            <thead>

                <tr>

                    <th>Desde Años</th>

                    <th>Hasta Años</th>

                    <th>Días Aguinaldo</th>

                    <th>Orden</th>

                    <th>Acciones</th>

                </tr>

            </thead>

            <tbody>

                {% for tramo in tramos %}

                <tr>

                    <td>

                        {{ tramo.antiguedad_desde }}

                    </td>

                    <td>

                        {{ tramo.antiguedad_hasta|default:"∞" }}

                    </td>

                    <td>

                        {{ tramo.dias_aguinaldo }}

                    </td>

                    <td>

                        {{ tramo.orden }}

                    </td>

                    <td>

                        <button
                            class="btn btn-warning btn-sm"

                            hx-get="{% url 'aguinaldo_editar' tramo.id %}"

                            hx-target="#modal-container"

                            hx-swap="innerHTML">

                            <i class="bi bi-pencil"></i>

                        </button>

                    </td>

                </tr>

                {% empty %}

                <tr>

                    <td colspan="5">

                        No existen tramos registrados

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>
