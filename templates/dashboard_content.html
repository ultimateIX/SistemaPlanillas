<div class="topbar d-flex justify-content-between align-items-center mb-4">

    <h5>
        Bienvenido, {{ user.username }}
    </h5>

</div>

<div class="row g-3">

    <div class="col-md-4">

        <div class="card p-3 shadow-sm">

            <h6>👥 Empleados Activos</h6>

            <h3>
                {{ empleados_activos }}
            </h3>

            <span class="text-success">
                Registrados en el sistema
            </span>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card p-3 shadow-sm">

            <h6>📄 Planillas Generadas</h6>

            <h3>
                {{ planillas_generadas }}
            </h3>

            <span class="text-success">
                Historial actual
            </span>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card p-3 shadow-sm">

            <h6>💰 Última Planilla</h6>

            <h3>
                ${{ total_ultima_planilla|floatformat:2 }}
            </h3>

            <span class="text-success">
                Total pagado
            </span>

        </div>

    </div>

</div>
